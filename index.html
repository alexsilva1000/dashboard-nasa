<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard NASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">Análise de Temperatura Global (NASA)</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4 mx-auto text-center">
                <label for="filtroAno" class="form-label">Filtrar por Ano Inicial:</label>
                <input type="range" class="form-range" id="filtroAno" min="1880" max="2023" value="1880">
                <span id="anoSelecionado" class="badge bg-primary">1880</span>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white text-center"><strong>Variação Anual de Temperatura</strong></div>
                    <div class="card-body"><canvas id="graficoLinha"></canvas></div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white text-center"><strong>Médias por Período</strong></div>
                    <div class="card-body"><canvas id="graficoBarras"></canvas></div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white text-center"><strong>Distribuição Mensal (Janeiro)</strong></div>
                    <div class="card-body"><canvas id="graficoPolar"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
